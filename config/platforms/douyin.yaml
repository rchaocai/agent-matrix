# 抖音平台配置
width: 1080
height: 1920
max_length: 300
dpi: 150

# 字体配置
fonts:
  title:
    family: Source Han Serif CN, serif
    size: 100
    weight: bold
    color: "#FFFFFF"
    line_height: 1.4
  body:
    family: Source Han Serif CN, serif
    size: 60
    weight: normal
    color: "#E0E0E0"
    line_height: 1.6

# 颜色方案
colors:
  background: "#1A1A1A"
  primary: "#FF0050"
  secondary: "#888888"
  text: "#FFFFFF"
  accent: "#00E5FF"

# 间距配置
spacing:
  padding_top: 140
  padding_bottom: 140
  padding_left: 90
  padding_right: 90
  padding_x: 90
  padding_y: 140
  padding_horizontal: 90
  padding_vertical: 140
  title_margin_bottom: 70
  content_margin_bottom: 70
  content_padding_x: 70
  content_padding_y: 50
  card_padding: 50
  footer_margin_top: 90

# 模板配置
templates:
  dark:
    background: solid
    background_color: "#1A1A1A"
    border: false
    shadow: false
    color_schemes:
      - name: default
        background: "#1A1A1A"
        primary: "#FF0050"
        secondary: "#888888"
        text: "#FFFFFF"
        accent: "#00E5FF"
      - name: deep
        background: "#0D0D0D"
        primary: "#FF1744"
        secondary: "#666666"
        text: "#EEEEEE"
        accent: "#00BCD4"
    font_schemes:
      - name: default
        title_font: Songti SC, serif
        body_font: PingFang SC, sans-serif
      - name: modern
        title_font: PingFang SC, sans-serif
        body_font: PingFang SC, sans-serif
      - name: bold
        title_font: Heiti SC, sans-serif
        body_font: Heiti SC, sans-serif
  neon:
    background: gradient
    gradient_colors: ["#0A0A0A", "#2A2A2A"]
    border: false
    color_schemes:
      - name: cyberpunk
        background: "linear-gradient(180deg, #0A0A0A 0%, #2A2A2A 100%)"
        primary: "#FF0050"
        secondary: "#00E5FF"
        text: "#FFFFFF"
        accent: "#FFD700"
      - name: synthwave
        background: "linear-gradient(180deg, #1A0B2E 0%, #2D1B4E 100%)"
        primary: "#FF00FF"
        secondary: "#00FFFF"
        text: "#FFFFFF"
        accent: "#FF6B6B"
    font_schemes:
      - name: default
        title_font: PingFang SC, sans-serif
        body_font: PingFang SC, sans-serif
      - name: elegant
        title_font: Songti SC, serif
        body_font: Songti SC, serif
      - name: bold
        title_font: Heiti SC, sans-serif
        body_font: Heiti SC, sans-serif
