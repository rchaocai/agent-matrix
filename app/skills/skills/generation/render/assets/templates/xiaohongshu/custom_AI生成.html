{% extends "base/layout.html" %}

{% block extra_css %}
<style>
    .container {
        background-color: {{ config.colors.background | default('#FFFFFF') }};
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100%;
        padding: {{ config.spacing.padding_y | default(120) }}px {{ config.spacing.padding_x | default(80) }}px;
        position: relative;
        overflow: hidden;
    }

    .container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(245, 245, 245, 0.8) 0%, rgba(250, 250, 250, 0.9) 100%);
        z-index: 0;
    }

    .title {
        font-size: {{ config.fonts.title.size }}px !important;
        font-weight: 900;
        color: {{ config.fonts.title.color | default('#000000') }};
        text-align: center;
        margin-bottom: {{ config.spacing.title_margin_bottom | default(80) }}px;
        position: relative;
        z-index: 1;
        letter-spacing: -2px;
        line-height: 1.1;
        max-width: 90%;
    }

    .content {
        font-size: {{ config.fonts.body.size }}px !important;
        font-weight: 400;
        color: {{ config.fonts.body.color | default('#333333') }};
        background-color: rgba(255, 255, 255, 0.95);
        padding: {{ config.spacing.content_padding | default(60) }}px;
        border-radius: {{ config.spacing.border_radius | default(20) }}px;
        position: relative;
        z-index: 1;
        max-width: 90%;
        line-height: 1.6;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .content::before {
        content: '';
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        bottom: 20px;
        border: 1px solid rgba(0, 0, 0, 0.03);
        border-radius: {{ config.spacing.border_radius | default(20) }}px;
        pointer-events: none;
    }

    .decoration {
        position: absolute;
        z-index: 0;
        opacity: 0.03;
    }

    .decoration-circle {
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: linear-gradient(135deg, #000000 0%, #333333 100%);
        top: -200px;
        right: -200px;
    }

    .decoration-line {
        width: 600px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #000000, transparent);
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
    }

    .footer {
        margin-top: {{ config.spacing.footer_margin_top | default(60) }}px;
        font-size: {{ config.fonts.body.size | default(60) * 0.8 }}px;
        color: {{ config.fonts.body.color | default('#333333') }};
        opacity: 0.7;
        text-align: center;
        position: relative;
        z-index: 1;
        font-weight: 300;
        letter-spacing: 1px;
    }
</style>
{% endblock %}
