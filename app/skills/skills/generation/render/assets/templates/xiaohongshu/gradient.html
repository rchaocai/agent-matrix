{% extends "base/layout.html" %}

{% block extra_css %}
<style>
    .container {
        background: linear-gradient(135deg, #FFE5E5 0%, #FFD0D0 50%, #FFB8B8 100%);
        box-shadow: 0 15px 40px rgba(255, 36, 66, 0.15);
    }

    .title {
        font-size: {{ config.fonts.title.size }}px !important;
        text-align: center;
        font-weight: 700;
        background: linear-gradient(45deg, {{ config.colors.primary }}, #FF6B8A);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 2px 4px rgba(255, 36, 66, 0.1);
    }

    .content {
        font-size: {{ config.fonts.body.size }}px !important;
        font-weight: 500;
        background-color: rgba(255, 255, 255, 0.6);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .footer {
        font-weight: 600;
        color: {{ config.colors.primary }};
    }
</style>
{% endblock %}
