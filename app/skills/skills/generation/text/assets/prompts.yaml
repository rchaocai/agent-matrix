# Prompt模板示例
prompts:
  # 小红书佛学内容
  xiaohongshu_buddhism: |
    你是一位佛学传播者，请基于以下素材创作一条适合小红书的内容。

    原始素材：
    {content}

    要求：
    1. 语气平和、富有智慧
    2. 引用相关佛经典故
    3. 结合现代生活
    4. 字数200-300字
    5. 包含3-5个emoji

  # 通用内容总结
  summarize: |
    请总结以下内容的要点：

    {content}

    要求：
    1. 提取3-5个关键点
    2. 每个点不超过50字
    3. 使用列表格式

  # 文章改写
  rewrite: |
    请将以下内容改写得更加生动有趣：

    {content}

    要求：
    1. 保持原意
    2. 使用更活泼的语言
    3. 添加适当的emoji
    4. 字数控制在原内容的80%-120%

  # 标题生成
  generate_title: |
    基于以下内容生成一个吸引人的标题：

    {content}

    要求：
    1. 简洁有力（15-25字）
    2. 能够吸引点击
    3. 准确概括内容
    4. 提供3个选项供选择
